<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sitanet Business Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1c2e 0%, #2d3154 50%, #4f46e5 100%);
        }
        .login-card {
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: #4f46e5;
            border-color: #4f46e5;
        }
        .btn-primary:hover {
            background: #4338ca;
            border-color: #4338ca;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="login-card card p-4">
        <div class="card-body">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Sitanet Business Wallet</h3>
                <p class="text-muted">Corporate Wallet Management</p>
            </div>
            
            {% if form.errors %}
                <div class="alert alert-danger">
                    Invalid username or password.
                </div>
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
